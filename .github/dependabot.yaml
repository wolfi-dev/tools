---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
  - package-ecosystem: terraform
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
